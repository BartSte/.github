name: pypi

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to install with uv.
        type: string
        required: false
      repository-url:
        description: Optional package index URL (e.g., TestPyPI).
        type: string
        required: false
        default: ''
      environment-name:
        description: GitHub environment that approves the publish.
        type: string
        required: false
        default: 'release'

jobs:
  pypi-publish:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    # Use the caller-provided environment (defaults to "release").
    environment: ${{ inputs.environment-name }}
    steps:
      # Check out the repository that invoked this workflow.
      - name: Checkout code
        uses: actions/checkout@v4

      # Install the requested Python version via uv when the caller specifies one.
      - name: Set up uv (with explicit Python version)
        if: ${{ inputs.python-version != '' }}
        uses: astral-sh/setup-uv@v2
        with:
          python-version: ${{ inputs.python-version }}

      # Install uv with its default Python version when the caller omits the input.
      - name: Set up uv (use action default Python version)
        if: ${{ inputs.python-version == '' }}
        uses: astral-sh/setup-uv@v2

      - name: Sync pyproject version with tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' pyproject.toml

      - name: Commit version update
        env:
          TAG_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet pyproject.toml; then
            echo "pyproject.toml already matches ${TAG_NAME}"
          else
            git commit -am "chore: set project version to ${TAG_NAME}"
            git push origin HEAD:${DEFAULT_BRANCH}
          fi

      # Install dependencies, enforcing the lock file; caller must provide pyproject.toml and uv.lock.
      - name: Install dependencies
        run: uv sync --frozen

      # Build both wheel and sdist artifacts using uv.
      - name: Build dist
        run: uv build --wheel --sdist

      # Publish to the default PyPI repository using trusted publishing.
      - name: Publish package distributions to PyPI
        if: ${{ inputs.repository-url == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      # Publish to an alternate repository (e.g., TestPyPI) when requested by the caller.
      - name: Publish package distributions to alternate repository
        if: ${{ inputs.repository-url != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ inputs.repository-url }}
